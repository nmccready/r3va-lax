<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>R3VA LAX — Brand Reveal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
  :root{
    --cyan:#1FB6E8;
    --ink:#111418;
    --bg1:#ffffff;
    --bg2:#e9eef2;
    /* master timeline length — change this one number to retime everything */
    --T: 7s;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    display:grid;place-items:center;
    background:radial-gradient(120% 120% at 50% 40%, var(--bg1) 0%, var(--bg2) 100%);
    font-family:'Anton','Arial Black',Impact,sans-serif;
    overflow:hidden;
  }
  .stage{
    position:relative;
    width:min(92vw,960px);
    height:min(92vw,960px);
    max-height:100vh;
    display:grid;place-items:center;
  }
  /* shared wordmark styling — mimics the logo: dark fill, cyan outline */
  .word{
    position:absolute;
    white-space:nowrap;
    font-weight:400;
    letter-spacing:.02em;
    color:var(--ink);
    -webkit-text-stroke:3px var(--cyan);
    text-stroke:3px var(--cyan);
    opacity:0;
    will-change:transform,opacity,filter;
  }
  .rva   { font-size:20vmin; }
  .revo  { font-size:11.5vmin; }
  .rvca  { font-size:20vmin; }
  .r3va  { font-size:22vmin; }
  .r3va .three{ color:var(--cyan); -webkit-text-stroke:3px var(--ink); text-stroke:3px var(--ink); }

  /* the final logo lockup */
  .lockup{
    position:absolute; inset:0; display:grid; place-items:center;
    opacity:0; transform:scale(.6); will-change:transform,opacity;
  }
  .lockup img{ width:78%; height:auto; filter:drop-shadow(0 10px 30px rgba(31,182,232,.35)); }

  /* ---------- TIMELINE (percentages of --T) ----------
     RVA in        0-12%
     hold          12-20%
     -> REVOLUTION 20-30%   hold 30-42%
     -> RVCA       42-52%   hold 52-60%
     -> R3VA       60-72%   hold 72-82%
     -> LOCKUP     78-100%
  ------------------------------------------------------ */

  .rva   { animation: rvaSeq   var(--T) cubic-bezier(.2,.7,.2,1) forwards; }
  .revo  { animation: revoSeq  var(--T) cubic-bezier(.2,.7,.2,1) forwards; }
  .rvca  { animation: rvcaSeq  var(--T) cubic-bezier(.2,.7,.2,1) forwards; }
  .r3va  { animation: r3vaSeq  var(--T) cubic-bezier(.2,.7,.2,1) forwards; }
  .lockup{ animation: lockSeq  var(--T) cubic-bezier(.2,.7,.2,1) forwards; }

  @keyframes rvaSeq{
    0%   {opacity:0; transform:translateX(-60vw) skewX(-12deg); filter:blur(6px);}
    10%  {opacity:1; transform:translateX(0) skewX(0); filter:blur(0);}
    18%  {opacity:1; transform:translateX(0) scale(1);}
    24%  {opacity:0; transform:translateX(8vw) scale(1.15); filter:blur(8px);}
    100% {opacity:0;}
  }
  @keyframes revoSeq{
    0%,20%{opacity:0; transform:scale(.7); filter:blur(8px); letter-spacing:-.2em;}
    27%   {opacity:1; transform:scale(1); filter:blur(0); letter-spacing:.02em;}
    40%   {opacity:1; transform:scale(1);}
    48%   {opacity:0; transform:scale(.82); filter:blur(8px); letter-spacing:-.18em;}
    100%  {opacity:0;}
  }
  @keyframes rvcaSeq{
    0%,42%{opacity:0; transform:translateY(18px) scale(.85); filter:blur(8px);}
    50%   {opacity:1; transform:translateY(0) scale(1); filter:blur(0);}
    58%   {opacity:1; transform:scale(1);}
    66%   {opacity:0; transform:scale(1.08) rotateX(40deg); filter:blur(6px);}
    100%  {opacity:0;}
  }
  @keyframes r3vaSeq{
    0%,60%{opacity:0; transform:scale(.8) rotateX(-40deg); filter:blur(8px);}
    70%   {opacity:1; transform:scale(1) rotateX(0); filter:blur(0);}
    80%   {opacity:1; transform:scale(1);}
    86%   {opacity:0; transform:scale(.78) translateY(-6vmin); filter:blur(6px);}
    100%  {opacity:0;}
  }
  @keyframes lockSeq{
    0%,78%{opacity:0; transform:scale(.62);}
    90%   {opacity:1; transform:scale(1.02);}
    95%   {opacity:1; transform:scale(1);}
    100%  {opacity:1; transform:scale(1);}
  }

  /* "3" flip accent inside R3VA */
  .r3va .three{ display:inline-block; animation: flip3 var(--T) ease forwards; }
  @keyframes flip3{
    0%,62%{transform:rotateY(90deg);}
    71%   {transform:rotateY(0deg);}
    100%  {transform:rotateY(0deg);}
  }

  /* replay control */
  .replay{
    position:fixed; right:16px; bottom:14px; z-index:10;
    font-family:system-ui,sans-serif; font-size:13px; letter-spacing:.04em;
    background:var(--cyan); color:#fff; border:0; border-radius:999px;
    padding:8px 16px; cursor:pointer; box-shadow:0 4px 14px rgba(31,182,232,.4);
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="word rva">RVA</div>
    <div class="word revo">REVOLUTION</div>
    <div class="word rvca">RVCA</div>
    <div class="word r3va">R<span class="three">3</span>VA</div>
    <div class="lockup"><img src="../images/r3va-logo.png" alt="R3VA LAX"></div>
  </div>
  <button class="replay" onclick="replay()">↻ Replay</button>
<script>
  function replay(){
    const s = document.getElementById('stage');
    const c = s.cloneNode(true);
    s.parentNode.replaceChild(c, s);
    c.id = 'stage';
  }
  // Deterministic frame capture: ?t=<seconds> freezes the whole timeline at t.
  (function(){
    const p = new URLSearchParams(location.search);
    if(!p.has('t')) return;
    const t = parseFloat(p.get('t'))||0;
    document.querySelector('.replay').style.display='none';
    const animated = document.querySelectorAll('.rva,.revo,.rvca,.r3va,.r3va .three,.lockup');
    animated.forEach(el=>{
      el.style.animationDelay = (-t)+'s';
      el.style.animationPlayState = 'paused';
    });
  })();
</script>
</body>
</html>
