<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>R3VA LAX — Brand Reveal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
  :root{
    --cyan:#1FB6E8;
    --ink:#111418;
    --bg1:#ffffff;
    --bg2:#e9eef2;
    /* master timeline length — change this one number to retime everything */
    --T: 8.5s;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    display:grid;place-items:center;
    background:radial-gradient(120% 120% at 50% 40%, var(--bg1) 0%, var(--bg2) 100%);
    font-family:'Anton','Arial Black',Impact,sans-serif;
    overflow:hidden;
  }
  .stage{
    position:relative;
    width:min(92vw,960px);
    height:min(92vw,960px);
    max-height:100vh;
    display:grid;place-items:center;
  }
  /* shared wordmark styling — mimics the logo: dark fill, cyan outline */
  .word{
    position:absolute;
    white-space:nowrap;
    font-weight:400;
    letter-spacing:.02em;
    color:var(--ink);
    -webkit-text-stroke:3px var(--cyan);
    text-stroke:3px var(--cyan);
    opacity:0;
    will-change:transform,opacity,filter;
  }
  .rva   { font-size:20vmin; }
  .revo  { font-size:13.6vmin; }            /* v2: bigger */
  .rvca  { font-size:20vmin; }
  .r3va  { font-size:22vmin; }
  .r3va .three{ color:var(--cyan); -webkit-text-stroke:3px var(--ink); text-stroke:3px var(--ink); }

  /* RVCA rendered as the "balance of opposites": mirrored two-tone halves */
  .rvca .op1{ color:var(--cyan); -webkit-text-stroke:3px var(--ink); text-stroke:3px var(--ink); }
  .rvca .op2{ color:var(--ink);  -webkit-text-stroke:3px var(--cyan); text-stroke:3px var(--cyan); }

  /* captions / tagline — clean sans, not the display face */
  .cap, .tag{
    position:absolute;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    font-weight:700; color:var(--ink);
    text-transform:uppercase; white-space:nowrap;
    opacity:0; will-change:transform,opacity;
  }
  .cap{ font-size:3.1vmin; letter-spacing:.42em; transform:translateY(14vmin); }
  .cap b{ color:var(--cyan); }
  .tag{ font-size:3.5vmin; letter-spacing:.34em; transform:translateY(31vmin); }
  .tag b{ color:var(--cyan); }

  /* the final logo lockup */
  .lockup{
    position:absolute; inset:0; display:grid; place-items:center;
    opacity:0; transform:scale(.6); will-change:transform,opacity;
  }
  .lockup img{ width:72%; height:auto; transform:translateY(-4vmin);
               filter:drop-shadow(0 10px 30px rgba(31,182,232,.35)); }

  /* ---------- TIMELINE beats (% of --T = 8.5s) ----------
     RVA        in 0-8 · hold · out 22
     REVOLUTION in 20 · hold 28-42 · out 47        (big, long)
     RVCA       in 46 · hold 53-64 · out 68
       + "BALANCE OF OPPOSITES" caption 55-68
     R3VA       in 67 · hold 75-82 · out 88
     LOCKUP     in 81-94 · hold
       + "A GAME OF BALANCE" tagline 87-100
  -------------------------------------------------------- */
  .rva   { animation: rvaSeq  var(--T) cubic-bezier(.2,.7,.2,1) forwards; }
  .revo  { animation: revoSeq var(--T) cubic-bezier(.2,.7,.2,1) forwards; }
  .rvca  { animation: rvcaSeq var(--T) cubic-bezier(.2,.7,.2,1) forwards; }
  .cap   { animation: capSeq  var(--T) ease forwards; }
  .r3va  { animation: r3vaSeq var(--T) cubic-bezier(.2,.7,.2,1) forwards; }
  .lockup{ animation: lockSeq var(--T) cubic-bezier(.2,.7,.2,1) forwards; }
  .tag   { animation: tagSeq  var(--T) ease forwards; }
  .r3va .three{ display:inline-block; animation: flip3 var(--T) ease forwards; }

  @keyframes rvaSeq{
    0%   {opacity:0; transform:translateX(-60vw) skewX(-12deg); filter:blur(6px);}
    8%   {opacity:1; transform:translateX(0) skewX(0); filter:blur(0);}
    18%  {opacity:1; transform:translateX(0) scale(1);}
    22%  {opacity:0; transform:translateX(7vw) scale(1.15); filter:blur(8px);}
    100% {opacity:0;}
  }
  @keyframes revoSeq{
    0%,20%{opacity:0; transform:scale(.72); filter:blur(8px); letter-spacing:-.18em;}
    28%   {opacity:1; transform:scale(1); filter:blur(0); letter-spacing:.02em;}
    42%   {opacity:1; transform:scale(1); letter-spacing:.02em;}
    47%   {opacity:0; transform:scale(.84); filter:blur(8px); letter-spacing:-.16em;}
    100%  {opacity:0;}
  }
  @keyframes rvcaSeq{
    0%,46%{opacity:0; transform:translateY(16px) scale(.86); filter:blur(8px);}
    53%   {opacity:1; transform:translateY(0) scale(1); filter:blur(0);}
    64%   {opacity:1; transform:scale(1);}
    68%   {opacity:0; transform:scale(1.07) rotateX(36deg); filter:blur(6px);}
    100%  {opacity:0;}
  }
  @keyframes capSeq{
    0%,52%{opacity:0; transform:translateY(18vmin);}
    61%   {opacity:1; transform:translateY(14vmin);}
    64%   {opacity:1; transform:translateY(14vmin);}
    68%   {opacity:0; transform:translateY(12vmin);}
    100%  {opacity:0;}
  }
  @keyframes r3vaSeq{
    0%,67%{opacity:0; transform:scale(.8) rotateX(-40deg); filter:blur(8px);}
    75%   {opacity:1; transform:scale(1) rotateX(0); filter:blur(0);}
    82%   {opacity:1; transform:scale(1);}
    88%   {opacity:0; transform:scale(.8) translateY(-7vmin); filter:blur(6px);}
    100%  {opacity:0;}
  }
  @keyframes flip3{
    0%,69%{transform:rotateY(90deg);}
    77%   {transform:rotateY(0deg);}
    100%  {transform:rotateY(0deg);}
  }
  @keyframes lockSeq{
    0%,81%{opacity:0; transform:scale(.64);}
    92%   {opacity:1; transform:scale(1.02);}
    96%   {opacity:1; transform:scale(1);}
    100%  {opacity:1; transform:scale(1);}
  }
  @keyframes tagSeq{
    0%,87%{opacity:0; transform:translateY(35vmin);}
    95%   {opacity:1; transform:translateY(31vmin);}
    100%  {opacity:1; transform:translateY(31vmin);}
  }

  .replay{
    position:fixed; right:16px; bottom:14px; z-index:10;
    font-family:system-ui,sans-serif; font-size:13px; letter-spacing:.04em;
    background:var(--cyan); color:#fff; border:0; border-radius:999px;
    padding:8px 16px; cursor:pointer; box-shadow:0 4px 14px rgba(31,182,232,.4);
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="word rva">RVA</div>
    <div class="word revo">REVOLUTION</div>
    <div class="word rvca"><span class="op1">RV</span><span class="op2">CA</span></div>
    <div class="cap">Balance of <b>Opposites</b></div>
    <div class="word r3va">R<span class="three">3</span>VA</div>
    <div class="lockup"><img src="../images/r3va-logo.png" alt="R3VA LAX"></div>
    <div class="tag">A Game of <b>Balance</b></div>
  </div>
  <button class="replay" onclick="replay()">↻ Replay</button>
<script>
  function replay(){
    const s = document.getElementById('stage');
    const c = s.cloneNode(true);
    s.parentNode.replaceChild(c, s);
    c.id = 'stage';
  }
  // Deterministic frame capture: ?t=<seconds> freezes the whole timeline at t.
  (function(){
    const p = new URLSearchParams(location.search);
    if(!p.has('t')) return;
    const t = parseFloat(p.get('t'))||0;
    document.querySelector('.replay').style.display='none';
    const animated = document.querySelectorAll('.rva,.revo,.rvca,.cap,.r3va,.r3va .three,.lockup,.tag');
    animated.forEach(el=>{
      el.style.animationDelay = (-t)+'s';
      el.style.animationPlayState = 'paused';
    });
  })();
</script>
</body>
</html>
