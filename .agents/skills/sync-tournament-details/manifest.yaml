# `mentioned_in` is the list of files where this tournament's name / date /
# venue appears and which must be kept in sync.
#
# `overrides` documents deliberate local phrasing that should NOT be flagged as
# drift on future runs. Add an entry the first time the user confirms a diff is
# intentional.

