    Title: "Revolution Lacrosse Richmond"
    Subtitle: "Summer 2026 — Rising 3rd through 8th graders"
    Content: |
      R3VA is Richmond, VA's **cost-effective** youth lacrosse program. We sit between expensive travel clubs and recreational leagues — focused on the holistic development of the athlete, not financial extraction or short-term accolades.
      <br>
      <br>
      **Our mission.** Cultivate a love for lacrosse via fundamental skill development and a positive, educational environment. Foster athletic growth and game understanding via comprehensive training. Emphasize fun, fair competitive play, focusing on player development and engagement over winning.
      <br>
      <br>
      **How we coach.** Maximizing touches and stressing the fundamentals of the game. We prioritize player development and engagement over winning, to stress fun and learning over short-term results. We want players to love the game and to feel like they are improving, which is the best way to ensure long-term growth and success.
      <br>
      <br>
      **Cost is transparent.** Per-player pricing covers tournament entry, refs, fields, insurance, and a small ~15% operational margin for sustainability. No hidden fees — full breakdown shared up front.
      <br>
      <br>
      **Six age bands for Summer 2026:**

      - 8U — Class of 2036
      - 9U — Class of 2035
      - 10U — Class of 2034
      - 11U — Class of 2033
      - 12U — Class of 2032
      - 13U — Class of 2031

      Two tournaments:

      - Legends Eastern Invitational (Jun 27–28, River City Sportsplex, Midlothian VA)
      - Freedom Lax Fest (Jul 11–12, Havelock NC)

      → **[Vote Early Summer 26 Interest](/r3va-lax/interest/)** — Tell us which age group your player wants. We run a team if enough kids vote yes.

      → [See age group details](/r3va-lax/teams/) &nbsp;·&nbsp; [Full mission and philosophy](/r3va-lax/about/)

